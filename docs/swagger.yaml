basePath: /api/v1
definitions:
  handlers.BlueprintItem:
    properties:
      created_at:
        type: string
      data:
        additionalProperties: true
        type: object
      description:
        type: string
      external_id:
        type: string
      id:
        type: integer
      image_filename:
        type: string
      image_url:
        type: string
      name:
        type: string
      synced_at:
        type: string
      type:
        type: string
      updated_at:
        type: string
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        example: Description of the error
        type: string
    type: object
  handlers.PaginatedResponse:
    properties:
      data: {}
      pagination:
        $ref: '#/definitions/handlers.PaginationDetails'
    type: object
  handlers.PaginationDetails:
    properties:
      limit:
        example: 20
        type: integer
      page:
        example: 1
        type: integer
      total:
        example: 100
        type: integer
    type: object
  handlers.RequiredItemResponse:
    properties:
      item:
        $ref: '#/definitions/models.Item'
      total_quantity:
        type: integer
      usages:
        items:
          $ref: '#/definitions/handlers.RequiredItemUsage'
        type: array
    type: object
  handlers.RequiredItemUsage:
    properties:
      level:
        description: For hideout modules, which level requires this
        type: integer
      quantity:
        type: integer
      source_id:
        type: integer
      source_name:
        type: string
      source_type:
        description: '"quest" or "hideout_module"'
        type: string
    type: object
  models.APIKey:
    properties:
      created_at:
        type: string
      id:
        type: integer
      last_used_at:
        type: string
      name:
        type: string
      revoked_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    type: object
  models.Alert:
    properties:
      created_at:
        type: string
      data:
        allOf:
        - $ref: '#/definitions/models.JSONB'
        description: Full data including multilingual content
      description:
        type: string
      id:
        type: integer
      is_active:
        description: Whether the alert is currently active
        type: boolean
      name:
        type: string
      severity:
        description: e.g., "info", "warning", "error", "critical"
        type: string
      updated_at:
        type: string
    type: object
  models.AuditLog:
    properties:
      api_key:
        $ref: '#/definitions/models.APIKey'
      api_key_id:
        type: integer
      created_at:
        type: string
      endpoint:
        type: string
      id:
        type: integer
      ip_address:
        type: string
      jwt_token:
        $ref: '#/definitions/models.JWTToken'
      jwt_token_id:
        type: integer
      method:
        type: string
      request_body:
        $ref: '#/definitions/models.JSONB'
      response_time_ms:
        type: integer
      status_code:
        type: integer
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    type: object
  models.Bot:
    properties:
      created_at:
        type: string
      data:
        $ref: '#/definitions/models.JSONB'
      external_id:
        type: string
      id:
        type: integer
      name:
        type: string
      synced_at:
        type: string
      updated_at:
        type: string
    type: object
  models.EnemyType:
    properties:
      created_at:
        type: string
      data:
        allOf:
        - $ref: '#/definitions/models.JSONB'
        description: Full data including multilingual content
      description:
        type: string
      external_id:
        type: string
      id:
        type: integer
      image_filename:
        type: string
      image_url:
        type: string
      name:
        type: string
      synced_at:
        type: string
      type:
        description: e.g., "Human", "Robot", "Alien"
        type: string
      updated_at:
        type: string
      weakpoints:
        allOf:
        - $ref: '#/definitions/models.JSONB'
        description: Array of weakpoint objects
    type: object
  models.HideoutModule:
    properties:
      created_at:
        type: string
      data:
        $ref: '#/definitions/models.JSONB'
      description:
        type: string
      external_id:
        type: string
      id:
        type: integer
      levels:
        allOf:
        - $ref: '#/definitions/models.JSONB'
        description: Array of level objects
      max_level:
        type: integer
      name:
        type: string
      synced_at:
        type: string
      updated_at:
        type: string
    type: object
  models.Item:
    properties:
      created_at:
        type: string
      data:
        $ref: '#/definitions/models.JSONB'
      description:
        type: string
      external_id:
        type: string
      id:
        type: integer
      image_filename:
        description: Original filename from JSON
        type: string
      image_url:
        type: string
      name:
        type: string
      synced_at:
        type: string
      type:
        description: e.g., "Material"
        type: string
      updated_at:
        type: string
    type: object
  models.JSONB:
    additionalProperties: true
    type: object
  models.JWTToken:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: integer
      revoked_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    type: object
  models.Map:
    properties:
      created_at:
        type: string
      data:
        $ref: '#/definitions/models.JSONB'
      external_id:
        type: string
      id:
        type: integer
      name:
        type: string
      synced_at:
        type: string
      updated_at:
        type: string
    type: object
  models.Project:
    properties:
      created_at:
        type: string
      data:
        $ref: '#/definitions/models.JSONB'
      external_id:
        type: string
      id:
        type: integer
      name:
        type: string
      synced_at:
        type: string
      updated_at:
        type: string
    type: object
  models.Quest:
    properties:
      created_at:
        type: string
      data:
        $ref: '#/definitions/models.JSONB'
      description:
        type: string
      external_id:
        type: string
      id:
        type: integer
      name:
        type: string
      objectives:
        allOf:
        - $ref: '#/definitions/models.JSONB'
        description: Array of strings
      reward_item_ids:
        allOf:
        - $ref: '#/definitions/models.JSONB'
        description: Array of {itemId, quantity}
      synced_at:
        type: string
      trader:
        type: string
      updated_at:
        type: string
      xp:
        type: integer
    type: object
  models.SkillNode:
    properties:
      category:
        type: string
      created_at:
        type: string
      data:
        $ref: '#/definitions/models.JSONB'
      description:
        type: string
      external_id:
        type: string
      icon_name:
        type: string
      id:
        type: integer
      impacted_skill:
        type: string
      is_major:
        type: boolean
      known_value:
        allOf:
        - $ref: '#/definitions/models.JSONB'
        description: Array
      max_points:
        description: Maximum level/points for this skill node (from GitHub maxPoints)
        type: integer
      name:
        type: string
      position:
        allOf:
        - $ref: '#/definitions/models.JSONB'
        description: '{x, y}'
      prerequisite_node_ids:
        allOf:
        - $ref: '#/definitions/models.JSONB'
        description: Array of strings
      synced_at:
        type: string
      updated_at:
        type: string
    type: object
  models.Trader:
    properties:
      created_at:
        type: string
      data:
        $ref: '#/definitions/models.JSONB'
      external_id:
        type: string
      id:
        type: integer
      name:
        type: string
      synced_at:
        type: string
      updated_at:
        type: string
    type: object
  models.User:
    properties:
      can_access_data:
        description: Admin-controlled access (deprecated - all users have read access
          by default)
        type: boolean
      created_at:
        type: string
      created_via_app:
        description: True if user was created via mobile app
        type: boolean
      discord_id:
        type: string
      email:
        type: string
      github_id:
        type: string
      id:
        type: integer
      role:
        $ref: '#/definitions/models.UserRole'
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.UserBlueprintProgress:
    properties:
      consumed:
        type: boolean
      created_at:
        type: string
      id:
        type: integer
      item:
        $ref: '#/definitions/models.Item'
      item_id:
        type: integer
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/models.User'
        description: Relations
      user_id:
        type: integer
    type: object
  models.UserHideoutModuleProgress:
    properties:
      created_at:
        type: string
      hideout_module:
        $ref: '#/definitions/models.HideoutModule'
      hideout_module_id:
        type: integer
      id:
        type: integer
      level:
        type: integer
      unlocked:
        type: boolean
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/models.User'
        description: Relations
      user_id:
        type: integer
    type: object
  models.UserQuestProgress:
    properties:
      completed:
        type: boolean
      created_at:
        type: string
      id:
        type: integer
      quest:
        $ref: '#/definitions/models.Quest'
      quest_id:
        type: integer
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/models.User'
        description: Relations
      user_id:
        type: integer
    type: object
  models.UserRole:
    enum:
    - admin
    - user
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleUser
  models.UserSkillNodeProgress:
    properties:
      created_at:
        type: string
      id:
        type: integer
      level:
        description: Current level (0 if not unlocked)
        type: integer
      skill_node:
        $ref: '#/definitions/models.SkillNode'
      skill_node_id:
        type: integer
      unlocked:
        type: boolean
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/models.User'
        description: Relations
      user_id:
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API Server for Arc Project (Mobile/Web)
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: ArcAPI
  version: "1.0"
paths:
  /admin/export/alerts:
    get:
      description: Fetch all alert data in CSV format. Only admins can export data.
      produces:
      - text/csv
      responses:
        "200":
          description: CSV file content
          schema:
            type: string
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Not an administrator
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Export alerts
      tags:
      - management
