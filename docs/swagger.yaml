      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Get user blueprint progress
      tags:
      - management
  /admin/users/{id}/progress/blueprints/{item_id}:
    put:
      consumes:
      - application/json
      description: Update blueprint consumption state for any user. Only admins can
        perform this.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Item External ID (Blueprint)
        in: path
        name: item_id
        required: true
        type: string
      - description: Consumption status
        in: body
        name: consumption
        required: true
        schema:
          additionalProperties:
            type: boolean
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated user blueprint progress
          schema:
            $ref: '#/definitions/models.UserBlueprintProgress'
        "400":
          description: Invalid input or ID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Not an administrator
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: User or Blueprint not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Update user blueprint progress
      tags:
      - management
