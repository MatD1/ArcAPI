  /admin/sync/force:
    post:
      consumes:
      - application/json
      description: Trigger an immediate synchronization of Game Data from GitHub.
        Only admins can force a sync.
      produces:
      - application/json
      responses:
        "200":
          description: Sync triggered successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Not an administrator
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Sync already running
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Force data sync
      tags:
      - sync
  /admin/sync/status:
    get:
      consumes:
      - application/json
      description: Check if a synchronization process is currently running. Only admins
        can check status.
      produces:
      - application/json
      responses:
        "200":
          description: Sync status
          schema:
            additionalProperties:
              type: boolean
            type: object
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Not an administrator
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Get sync status
      tags:
      - sync
  /admin/users/{id}/progress:
    get:
      consumes:
      - application/json
      description: Fetch a comprehensive summary of all progress types (quests, modules,
        skills, blueprints) for any user. Only admins can access this.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully fetched comprehensive progress
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid user ID
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Not authenticated
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Not an administrator
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Get all user progress
      tags:
      - management
  /admin/users/{id}/progress/blueprints:
    get:
